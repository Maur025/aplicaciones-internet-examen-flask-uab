services:
  metrics-monitor-db:
    image: mariadb:11.8.6
    container_name: metrics-monitor-db
    ports:
      - "3306:3306"
    volumes:
      - metrics-monitor-db:/var/lib/mysql
      - ./init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh
      - ./dumps:/dumps
    networks:
      - compose-net
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}

volumes:
  metrics-monitor-db:
    name: metrics-monitor-db

networks:
  compose-net:
    external: true